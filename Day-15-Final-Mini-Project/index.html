<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Mini Project - To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Final Mini Project - To-Do App: A simple to-do app using JavaScript. -->
    <main class="container">
        <h1 id="page-title">Final Mini Project - To-Do App</h1>
        <p class="lesson-topic">Topic: A simple to-do app using JavaScript</p>
        <form id="todo-form" class="todo-form">
            <input type="text" id="todo-input" placeholder="Add a new task">
            <button type="submit">Add Task</button>
        </form>
        <ul id="todo-list" class="todo-list"></ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
