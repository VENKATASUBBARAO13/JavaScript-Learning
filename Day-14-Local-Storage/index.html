<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Local Storage: Saving and loading data in the browser. -->

        <h1 id="page-title">Local Storage</h1>
        <p class="lesson-topic">Topic: Saving and loading data in the browser</p>
        <div class="panel">

            <input type="text" id="name-input" placeholder="Enter a name">

            <p id="saved-name"></p>
        </div>
    </main>

    <script src="script.js"></script>

</html>
