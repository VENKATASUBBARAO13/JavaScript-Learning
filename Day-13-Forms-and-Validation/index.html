<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms and Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Forms and Validation: Reading form values and checking input. -->
    <main class="container">
        <h1 id="page-title">Forms and Validation</h1>
        <p class="lesson-topic">Topic: Reading form values and checking input</p>
        <form id="signup-form" class="panel">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email">

            <button type="submit">Submit</button>
            <p id="result"></p>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
